services:
  web:
    build: .
    container_name: danylevskii-space
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Persist SQLite database outside container in a dedicated folder
      - ./data:/app/data
      # Persist uploaded images outside container
      - ./storage:/app/public/storage
